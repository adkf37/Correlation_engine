# ─────────────────────────────────────────────────
# Correlation Discovery Engine — Data Universe
# ─────────────────────────────────────────────────
#
# Each entry has:
#   id        – the series identifier (FRED code or Yahoo ticker)
#   name      – human-readable label
#   category  – grouping for filters / display
#   source    – "fred" or "yahoo"
#   frequency – native frequency hint (D=daily, M=monthly, Q=quarterly)
#
# The Watchlist class reads this file and fetches all series,
# then aligns everything to monthly frequency for scanning.
# ─────────────────────────────────────────────────

